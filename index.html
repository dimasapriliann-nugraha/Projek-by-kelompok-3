<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABEL & RESET --- */
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050510;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
            /* Mencegah teks terpilih saat menggeser kartu */
            user-select: none; 
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden; 
            overflow-y: auto; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- CONTAINER UTAMA --- */
        .main-frame {
            position: relative;
            width: 90%;
            max-width: 1200px;
            min-height: 85vh;
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 50px rgba(0, 243, 255, 0.1);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(5px);
            margin: 20px 0;
        }

        /* --- HEADER (TETAP DI TENGAH SESUAI PERMINTAAN) --- */
        header {
            padding: 30px 20px;
            border-bottom: 1px solid var(--neon-cyan);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: linear-gradient(180deg, transparent, rgba(0, 243, 255, 0.05));
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink);
            animation: text-flicker 3s infinite alternate;
            margin: 0;
        }

        .status-badge {
            border: 1px solid var(--neon-cyan);
            padding: 8px 25px;
            font-size: 0.9rem;
            color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- GALERI (VIEWPORT UNTUK GESER) --- */
        .gallery-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            cursor: grab; /* Indikator bisa ditarik */
        }

        .gallery-viewport:active {
            cursor: grabbing;
        }

        .gallery-track {
            display: flex;
            gap: 40px;
            padding: 0 40px;
            width: max-content;
            will-change: transform;
            /* Animasi CSS dihapus, diganti logika JS agar bisa di-drag */
        }

        .card {
            width: 300px;
            height: 400px;
            position: relative;
            background: #000;
            border: 1px solid var(--neon-purple);
            transition: transform 0.4s ease;
            flex-shrink: 0;
            pointer-events: auto;
        }

        /* FITUR WARNA TETAP SAMA (Grayscale ke Berwarna) */
        .card img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.6; filter: grayscale(100%);
            transition: all 0.5s ease;
            pointer-events: none; /* Supaya tidak mengganggu drag */
        }

        .card:hover img, .card.active img {
            opacity: 1; filter: grayscale(0%);
        }

        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px;
            background: linear-gradient(to top, #000, transparent);
            transform: translateY(100%); transition: transform 0.3s ease;
            border-top: 1px solid var(--neon-cyan); text-align: center;
        }

        .card:hover .card-overlay, .card.active .card-overlay {
            transform: translateY(0);
        }

        .card.active .card-title, .card.active .card-desc {
            transform: translateY(-40px); transition: transform 0.3s ease;
        }

        .card-title { color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; font-size: 1.2rem; }
        .card-desc { font-size: 0.8rem; color: #ddd; margin-bottom: 5px; }

        .card-btns {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            display: flex; gap: 10px; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }

        .card.active .card-btns {
            opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0);
        }

        .social-btn {
            padding: 6px 12px; border-radius: 4px; text-decoration: none;
            font-size: 0.7rem; font-weight: bold; color: #fff; border: 1px solid #fff;
        }
        .wa-btn { background: #25d366; box-shadow: 0 0 10px #25d366; }
        .ig-btn { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        /* --- FOOTER --- */
        footer {
            padding: 20px; border-top: 1px solid var(--neon-cyan);
            display: flex; justify-content: center; gap: 20px; background: rgba(0, 0, 0, 0.5);
        }

        .game-btn {
            background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 12px 30px; font-family: 'Orbitron', sans-serif; font-weight: bold;
            cursor: pointer; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 2000; display: flex; flex-direction: column; justify-content: center;
            align-items: center; transition: opacity 1s ease;
        }
        #start-overlay h1 { font-size: 3rem; margin-bottom: 20px; }

        .loader { width: 200px; height: 4px; background: #333; margin-top: 20px; position: relative; overflow: hidden; }
        .loader-bar { width: 0%; height: 100%; background: var(--neon-cyan); position: absolute; transition: width 0.5s; }

        @keyframes text-flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink); opacity: 1; }
            20%, 24%, 55% { text-shadow: none; opacity: 0.5; }
        }

        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .toast { background: rgba(0, 0, 0, 0.9); border-left: 4px solid var(--neon-cyan); color: #fff; padding: 15px 25px; margin-top: 10px; animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            #start-overlay h1 { font-size: 2rem !important; }
            .card { width: 220px; height: 300px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="start-overlay">
        <h1>SYSTEM READY</h1>
        <div class="loader">
            <div class="loader-bar" id="loader-bar"></div>
        </div>
        <p style="margin-top: 10px; color: var(--neon-cyan);">Kela Tungguan hela...</p>
    </div>

    <div id="toast-container"></div>

    <main class="main-frame" id="main-ui" style="opacity: 0; transform: scale(0.95);">
        <header>
            <h1>Kelompok<span style="color:var(--neon-cyan)">3</span></h1>
            <div class="status-badge">STATUS: ONLINE</div>
        </header>

        <section class="gallery-viewport" id="viewport">
            <div class="gallery-track" id="track"></div>
        </section>

        <footer>
            <button class="game-btn" onclick="toggleAnimation()"><span id="btn-text">PAUSE SYSTEM</span></button>
            <button class="game-btn" style="border-color: var(--neon-pink); color: var(--neon-pink);" onclick="warpSpeed()">WARP SPEED</button>
        </footer>
    </main>

    <script>
        // --- 1. BACKGROUND STARS ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, starSpeed = 2, warpMode = false;
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const stars = [];
        class Star {
            constructor() { this.reset(); }
            reset() { this.x = (Math.random() - 0.5) * width * 2; this.y = (Math.random() - 0.5) * height * 2; this.z = Math.random() * width; this.pz = this.z; }
            update() { this.z -= starSpeed; if (this.z < 1) { this.reset(); this.z = width; this.pz = this.z; } }
            draw() {
                const sx = (this.x / this.z) * (width / 2) + (width / 2);
                const sy = (this.y / this.z) * (height / 2) + (height / 2);
                const px = (this.x / this.pz) * (width / 2) + (width / 2);
                const py = (this.y / this.pz) * (height / 2) + (height / 2);
                this.pz = this.z;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy);
                ctx.strokeStyle = warpMode ? `rgb(255,0,255,${1-this.z/width})` : `rgb(0,243,255,${1-this.z/width})`;
                ctx.lineWidth = (1 - this.z / width) * 4; ctx.stroke();
            }
        }
        for (let i = 0; i < 400; i++) stars.push(new Star());
        function animateBg() { ctx.fillStyle = warpMode ? 'rgba(50,0,50,0.3)' : 'rgba(5,5,16,0.4)'; ctx.fillRect(0,0,width,height); stars.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(animateBg); }
        animateBg();

        // --- 2. DRAGGABLE INFINITE GALLERY LOGIC ---
        const viewport = document.getElementById('viewport');
        const track = document.getElementById('track');
        const images = [
            { src: 'me.jpg', title: 'Dimas', desc: 'XI RPL 2', wa: '6285794249679', ig: 'rahapcb' },
            { src: 'farid.jpg', title: 'Farid', desc: 'XI RPL 2', wa: '6285864401288', ig: 'ryzz_1808' },
            { src: 'ren.jpg', title: 'Renal', desc: 'XI RPL 2', wa: '6283856447628', ig: 'ran77.5' },
            { src: 'renaldi.jpg', title: 'Renaldy', desc: 'XI RPL 2', wa: '6285720946305', ig: 'aldyrenaldy2707' },
            { src: 'eka.jpg', title: 'Meiska', desc: 'XI RPL 2', wa: '6281521909973', ig: 'mskachyarhayu05' },
        ];

        function createCard(data) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${data.src}" alt="${data.title}">
                <div class="card-overlay">
                    <div class="card-title">${data.title}</div>
                    <div class="card-desc">${data.desc}</div>
                    <div class="card-btns">
                        <a href="https://wa.me/${data.wa}" target="_blank" class="social-btn wa-btn" onclick="event.stopPropagation()">WhatsApp</a>
                        <a href="https://instagram.com/${data.ig}" target="_blank" class="social-btn ig-btn" onclick="event.stopPropagation()">Instagram</a>
                    </div>
                </div>
            `;
            card.addEventListener('click', (e) => {
                if (isDragging) return; // Jangan buka kartu kalau cuma mau nge-drag
                const isActive = card.classList.contains('active');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                if (!isActive) {
                    card.classList.add('active');
                    isPaused = true; // Otomatis diam pas kartu diklik
                } else {
                    isPaused = false;
                }
            });
            return card;
        }

        // Duplikasi untuk loop tak terbatas
        function populate() { [...images, ...images, ...images].forEach(img => track.appendChild(createCard(img))); }
        populate();

        let currentPos = 0;
        let isPaused = false;
        let autoScrollSpeed = 1.5;

        // Logika Geser (Drag)
        let isDragging = false;
        let startX = 0;
        let scrollLeft = 0;

        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            isPaused = true; // Berhenti pas dipegang
            startX = e.pageX - track.offsetLeft;
            scrollLeft = currentPos;
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            // Cek apakah ada kartu yang lagi aktif, kalau tidak ada lanjut jalan
            const anyActive = document.querySelector('.card.active');
            if (!anyActive && !sysPausedManual) isPaused = false;
        });

        viewport.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - track.offsetLeft;
            const walk = (x - startX) * 1.5;
            currentPos = scrollLeft + walk;
        });

        // Touch support (HP)
        viewport.addEventListener('touchstart', (e) => {
            isDragging = true; isPaused = true;
            startX = e.touches[0].pageX - track.offsetLeft;
            scrollLeft = currentPos;
        });
        viewport.addEventListener('touchend', () => {
            isDragging = false;
            if (!document.querySelector('.card.active') && !sysPausedManual) isPaused = false;
        });
        viewport.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const x = e.touches[0].pageX - track.offsetLeft;
            const walk = (x - startX) * 1.5;
            currentPos = scrollLeft + walk;
        });

        // Loop Animasi Ticker
        function updateGallery() {
            if (!isPaused) {
                currentPos -= autoScrollSpeed;
            }

            // Loop reset (supaya ga pernah abis)
            const trackWidth = track.scrollWidth / 3;
            if (currentPos <= -trackWidth * 2) currentPos = -trackWidth;
            if (currentPos > 0) currentPos = -trackWidth;

            track.style.transform = `translateX(${currentPos}px)`;
            requestAnimationFrame(updateGallery);
        }
        updateGallery();

        // --- 3. UI CONTROLS ---
        function showToast(m) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        let sysPausedManual = false;
        function toggleAnimation() {
            sysPausedManual = !sysPausedManual;
            isPaused = sysPausedManual;
            document.getElementById('btn-text').innerText = sysPausedManual ? "RESUME SYSTEM" : "PAUSE SYSTEM";
        }

        function warpSpeed() { if(warpMode) return; warpMode = true; starSpeed = 50; autoScrollSpeed = 15; setTimeout(() => { starSpeed = 2; autoScrollSpeed = 1.5; warpMode = false; }, 2000); }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => document.getElementById('loader-bar').style.width = "100%", 500);
            setTimeout(() => {
                document.getElementById('start-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('start-overlay').style.display = 'none';
                    document.getElementById('main-ui').style.opacity = '1';
                    document.getElementById('main-ui').style.transform = 'scale(1)';
                    showToast("SELAMAT DATANG");
                }, 1000);
            }, 1500);
        });
    </script>
</body>
</html>
